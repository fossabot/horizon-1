# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog body
header = """
# Changelog\n
All notable changes to Horizon will be documented in this file.\n
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.darioajr }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
- **{{ commit.scope }}:** {{ commit.message | upper_first }}
  {%- if commit.breaking %} [**BREAKING**]{% endif -%}
  {%- if commit.body %}\n  {{ commit.body | indent(width=2) }}{% endif %}
  ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
- {{ commit.message | upper_first }}
  {%- if commit.breaking %} [**BREAKING**]{% endif -%}
  {%- if commit.body %}\n  {{ commit.body | indent(width=2) }}{% endif %}
  ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endif -%}
{%- endfor %}
{% endfor %}

{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
### New Contributors
{%- for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
* @{{ contributor.username }} made their first contribution
{%- endfor %}
{%- endif -%}

"""

footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""

trim = true

[git]
# Parse conventional commits
# https://www.conventionalcommits.org
conventional_commits = true
filter_unconventional = false
split_commits = false

# Commit grouping
commit_parsers = [
  { message = "^feat",     group = "🚀 Features" },
  { message = "^fix",      group = "🐛 Bug Fixes" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^docs",     group = "📚 Documentation" },
  { message = "^test",     group = "🧪 Tests" },
  { message = "^style",    group = "🎨 Style" },
  { message = "^ci",       group = "🔧 CI/CD" },
  { message = "^build",    group = "🏗️ Build" },
  { message = "^chore",    group = "📦 Miscellaneous" },
  { message = "^revert",   group = "⏪ Reverts" },
  # Catch-all for non-conventional commits
  { message = ".*",        group = "📝 Other" },
]

# Protect email addresses from being exposed
protect_breaking_commits = false
filter_commits = false

# Tag pattern (semver tags only)
tag_pattern = "v[0-9].*"

# Sort: oldest first within each group
sort_commits = "oldest"

[remote.github]
owner = ""
repo = "horizon"
