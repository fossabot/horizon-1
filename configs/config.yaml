# Horizon Configuration

broker:
  id: 1
  host: "0.0.0.0"
  port: 9092
  cluster_id: "horizon-cluster"

storage:
  data_dir: "./data"
  segment_size_mb: 1024        # 1GB per segment
  retention_hours: 168         # 7 days retention
  sync_writes: false           # Sync writes to disk
  flush_interval: 1s           # Background flush interval

defaults:
  num_partitions: 3            # Default partitions for new topics
  replication_factor: 1        # Default replication factor

performance:
  write_buffer_kb: 2048        # Write buffer size
  max_connections: 10000       # Maximum concurrent connections
  io_threads: 4                # I/O worker threads
  read_buffer_size: 65536      # Read buffer size per connection
