# Benchmark de Produção: Horizon vs Apache Kafka
# Uso: docker-compose -f docker-compose-benchmark.yml up
#
# Usa kafka-producer-perf-test (ferramenta nativa do Kafka)

services:
  # ============================================================================
  # Apache Kafka (para comparação)
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:8.1.1
    container_name: kafka-benchmark
    hostname: kafka
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-benchmark-data:/var/lib/kafka/data
    networks:
      - benchmark-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================================================
  # Benchmark Producer - Kafka
  # ============================================================================
  benchmark-kafka:
    image: confluentinc/cp-kafka:8.1.1
    container_name: benchmark-kafka
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./results:/results
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      NUM_RECORDS: ${NUM_RECORDS:-100000}
      RECORD_SIZE: ${RECORD_SIZE:-1024}
      THROUGHPUT: -1
    command:
      - /bin/bash
      - -c
      - |
        echo '=============================================='
        echo '  Benchmark de Producao - Apache Kafka'
        echo '=============================================='
        echo ''
        echo 'Criando topico benchmark-topic...'
        kafka-topics --bootstrap-server kafka:9092 --create --topic benchmark-topic --partitions 8 --replication-factor 1 --if-not-exists
        sleep 2
        echo ''
        echo 'Iniciando benchmark de producao...'
        echo "Records: $NUM_RECORDS, Size: $RECORD_SIZE bytes, Batch: 1MB, Linger: 10ms"
        echo ''
        kafka-producer-perf-test \
          --topic benchmark-topic \
          --num-records $NUM_RECORDS \
          --record-size $RECORD_SIZE \
          --throughput -1 \
          --producer-props \
            bootstrap.servers=kafka:9092 \
            acks=all \
            batch.size=1048576 \
            linger.ms=10 \
            buffer.memory=134217728 \
          2>&1 | tee /results/kafka-producer-benchmark.txt
        echo ''
        echo 'Benchmark Kafka concluido!'
        echo ''
    networks:
      - benchmark-net

  # ============================================================================
  # Benchmark Producer - Horizon
  # ============================================================================
  benchmark-horizon:
    image: confluentinc/cp-kafka:8.1.1
    container_name: benchmark-horizon
    volumes:
      - ./results:/results
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BOOTSTRAP_SERVERS: host.docker.internal:9092
      NUM_RECORDS: ${NUM_RECORDS:-100000}
      RECORD_SIZE: ${RECORD_SIZE:-1024}
      THROUGHPUT: -1
    command:
      - /bin/bash
      - -c
      - |
        echo '=============================================='
        echo '  Benchmark de Producao - Horizon'
        echo '=============================================='
        echo ''
        echo 'Criando topico benchmark-topic...'
        kafka-topics --bootstrap-server host.docker.internal:9092 --create --topic benchmark-topic --partitions 8 --replication-factor 1 --if-not-exists 2>/dev/null || true
        sleep 2
        echo ''
        echo 'Iniciando benchmark de producao...'
        echo "Records: $NUM_RECORDS, Size: $RECORD_SIZE bytes, Batch: 1MB, Linger: 10ms"
        echo ''
        kafka-producer-perf-test \
          --topic benchmark-topic \
          --num-records $NUM_RECORDS \
          --record-size $RECORD_SIZE \
          --throughput -1 \
          --producer-props \
            bootstrap.servers=host.docker.internal:9092 \
            acks=1 \
            batch.size=1048576 \
            linger.ms=10 \
            buffer.memory=134217728 \
            enable.idempotence=false \
          2>&1 | tee /results/horizon-producer-benchmark.txt
        echo ''
        echo 'Benchmark Horizon concluido!'
        echo ''
    networks:
      - benchmark-net

volumes:
  kafka-benchmark-data:

networks:
  benchmark-net:
    driver: bridge
