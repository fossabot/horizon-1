# Driver Kafka para OpenMessaging Benchmark
# Configuração otimizada para throughput (baseado no benchmark da Confluent)

name: Kafka
driverClass: io.openmessaging.benchmark.driver.kafka.KafkaBenchmarkDriver

# Kafka client config
replicationFactor: 1

topicConfig: |
  min.insync.replicas=1

commonConfig: |
  bootstrap.servers=kafka:9092
  
producerConfig: |
  acks=all
  batch.size=1048576
  linger.ms=10
  buffer.memory=134217728
  max.block.ms=120000
  retries=0
  compression.type=none

consumerConfig: |
  auto.offset.reset=earliest
  enable.auto.commit=false
  max.partition.fetch.bytes=10485760
