# Driver Horizon para OpenMessaging Benchmark
# Usa o driver Kafka já que Horizon é compatível com protocolo Kafka

name: Horizon
driverClass: io.openmessaging.benchmark.driver.kafka.KafkaBenchmarkDriver

# Horizon não suporta replicação ainda
replicationFactor: 1

topicConfig: |
  min.insync.replicas=1

commonConfig: |
  bootstrap.servers=host.docker.internal:9092
  
producerConfig: |
  acks=all
  batch.size=1048576
  linger.ms=10
  buffer.memory=134217728
  max.block.ms=120000
  retries=0
  compression.type=none

consumerConfig: |
  auto.offset.reset=earliest
  enable.auto.commit=false
  max.partition.fetch.bytes=10485760
